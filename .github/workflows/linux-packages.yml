name: OpenAI Reasoning Guard Packages

on:
  workflow_dispatch:
    inputs:
      target:
        description: "Target to build"
        required: false
        default: "linux-x86_64"
        type: choice
        options:
          - "linux-x86_64"
          - "linux-x86_32"
          - "linux-arm64"
          - "linux-arm32"
          - "windows-x86_64"
          - "windows-x86_32"
          - "windows-arm64"
          - "macos-x86_64"
          - "macos-aarch64"
          - "all"
      clean:
        description: "Clean package work/dist directories before building"
        required: false
        default: "true"
        type: choice
        options:
          - "true"
          - "false"
      publish_release:
        description: "Upload built packages to a GitHub Release"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"
      release_tag:
        description: "Release tag used when publish_release=true"
        required: false
        default: "nightly"
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  plan:
    name: Select package targets
    runs-on: ubuntu-22.04
    outputs:
      linux_enabled: ${{ steps.matrix.outputs.linux_enabled }}
      linux_matrix: ${{ steps.matrix.outputs.linux_matrix }}
      windows_enabled: ${{ steps.matrix.outputs.windows_enabled }}
      windows_matrix: ${{ steps.matrix.outputs.windows_matrix }}
      macos_enabled: ${{ steps.matrix.outputs.macos_enabled }}
      macos_matrix: ${{ steps.matrix.outputs.macos_matrix }}
    steps:
      - id: matrix
        shell: bash
        env:
          REQUESTED_TARGET: ${{ github.event_name == 'workflow_dispatch' && inputs.target || 'all' }}
        run: |
          set -euo pipefail

          linux_x86_64='{"arch":"x86_64","platform":"linux/amd64","image":"debian:bookworm","qt_secret":"QT_LINUX_X86_64_URL","sdk_release_tag":"qt-sdk-linux-x86_64","sdk_asset":"qt5-linux-x86_64.tar.xz","appimage_arch":"x86_64","appimage_runtime_asset":"runtime-x86_64"}'
          linux_x86_32='{"arch":"x86_32","platform":"linux/386","image":"i386/debian:bookworm","qt_secret":"QT_LINUX_X86_32_URL","sdk_release_tag":"qt-sdk-linux-x86_32","sdk_asset":"qt5-linux-x86_32.tar.xz","appimage_arch":"i686","appimage_runtime_asset":"runtime-i686"}'
          linux_arm64='{"arch":"arm64","platform":"linux/arm64","image":"arm64v8/debian:bookworm","qt_secret":"QT_LINUX_ARM64_URL","sdk_release_tag":"qt-sdk-linux-arm64","sdk_asset":"qt5-linux-arm64.tar.xz","appimage_arch":"aarch64","appimage_runtime_asset":"runtime-aarch64"}'
          linux_arm32='{"arch":"arm32","platform":"linux/arm/v7","image":"arm32v7/debian:bookworm","qt_secret":"QT_LINUX_ARM32_URL","sdk_release_tag":"qt-sdk-linux-arm32","sdk_asset":"qt5-linux-arm32.tar.xz","appimage_arch":"armhf","appimage_runtime_asset":"runtime-armhf"}'
          windows_x86_64='{"arch":"x86_64","mingw_triple":"x86_64-w64-mingw32","apt_package":"g++-mingw-w64-x86-64-posix","qt_secret":"QT_WINDOWS_X86_64_URL","sdk_release_tag":"qt-sdk-windows-x86_64","sdk_asset":"qt5-windows-x86_64.tar.xz"}'
          windows_x86_32='{"arch":"x86_32","mingw_triple":"i686-w64-mingw32","apt_package":"g++-mingw-w64-i686-posix","qt_secret":"QT_WINDOWS_X86_32_URL","sdk_release_tag":"qt-sdk-windows-x86_32","sdk_asset":"qt5-windows-x86_32.tar.xz"}'
          windows_arm64='{"arch":"arm64","mingw_triple":"aarch64-w64-mingw32","apt_package":"","llvm_mingw_url":"https://github.com/mstorsjo/llvm-mingw/releases/download/20260616/llvm-mingw-20260616-ucrt-ubuntu-22.04-x86_64.tar.xz","qt_secret":"QT_WINDOWS_ARM64_URL","sdk_release_tag":"qt-sdk-windows-arm64","sdk_asset":"qt5-windows-arm64.tar.xz"}'
          macos_x86_64='{"arch":"x86_64","runner":"macos-15-intel","cmake_arch":"x86_64","deployment_target":"10.13","qt_secret":"QT_MACOS_X86_64_URL","sdk_release_tag":"qt-sdk-macos-x86_64","sdk_asset":"qt5-macos-x86_64.tar.xz"}'
          macos_aarch64='{"arch":"aarch64","runner":"macos-14","cmake_arch":"arm64","deployment_target":"11.0","qt_secret":"QT_MACOS_ARM64_URL","sdk_release_tag":"qt-sdk-macos-aarch64","sdk_asset":"qt5-macos-aarch64.tar.xz"}'

          linux='[]'
          windows='[]'
          macos='[]'
          case "${REQUESTED_TARGET}" in
            all)
              linux="[${linux_x86_64},${linux_x86_32},${linux_arm64},${linux_arm32}]"
              windows="[${windows_x86_64},${windows_x86_32},${windows_arm64}]"
              macos="[${macos_x86_64},${macos_aarch64}]"
              ;;
            linux-x86_64) linux="[${linux_x86_64}]" ;;
            linux-x86_32) linux="[${linux_x86_32}]" ;;
            linux-arm64) linux="[${linux_arm64}]" ;;
            linux-arm32) linux="[${linux_arm32}]" ;;
            windows-x86_64) windows="[${windows_x86_64}]" ;;
            windows-x86_32) windows="[${windows_x86_32}]" ;;
            windows-arm64) windows="[${windows_arm64}]" ;;
            macos-x86_64) macos="[${macos_x86_64}]" ;;
            macos-aarch64) macos="[${macos_aarch64}]" ;;
            *)
              echo "unsupported target: ${REQUESTED_TARGET}" >&2
              exit 2
              ;;
          esac

          enabled() {
            [[ "$1" != "[]" ]] && printf true || printf false
          }

          {
            echo "linux_enabled=$(enabled "${linux}")"
            echo "linux_matrix={\"include\":${linux}}"
            echo "windows_enabled=$(enabled "${windows}")"
            echo "windows_matrix={\"include\":${windows}}"
            echo "macos_enabled=$(enabled "${macos}")"
            echo "macos_matrix={\"include\":${macos}}"
          } >> "${GITHUB_OUTPUT}"

  linux:
    name: Linux ${{ matrix.arch }} deb/rpm/AppImage
    needs: plan
    if: needs.plan.outputs.linux_enabled == 'true'
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.plan.outputs.linux_matrix) }}
    env:
      QT_ARCHIVE_URL: ${{ secrets[matrix.qt_secret] }}
      QT_ARCHIVE_FALLBACK_URL: https://github.com/${{ github.repository }}/releases/download/${{ matrix.sdk_release_tag }}/${{ matrix.sdk_asset }}
      DOWNLOAD_PROXY: ${{ secrets.DOWNLOAD_PROXY }}
      CLEAN_PACKAGES: ${{ github.event_name != 'workflow_dispatch' || inputs.clean != 'false' }}
      BUILD_TARGET: ${{ github.event_name == 'workflow_dispatch' && inputs.target || 'all' }}
    steps:
      - name: Checkout
        if: env.BUILD_TARGET == 'all' || env.BUILD_TARGET == format('linux-{0}', matrix.arch)
        uses: actions/checkout@v4

      - name: Enable QEMU
        if: env.BUILD_TARGET == 'all' || env.BUILD_TARGET == format('linux-{0}', matrix.arch)
        uses: docker/setup-qemu-action@v3

      - name: Build Linux packages
        if: env.BUILD_TARGET == 'all' || env.BUILD_TARGET == format('linux-{0}', matrix.arch)
        shell: bash
        run: |
          set -euo pipefail
          if [[ -z "${QT_ARCHIVE_URL:-}" && -z "${QT_ARCHIVE_FALLBACK_URL:-}" ]]; then
            echo "Missing repository secret ${{ matrix.qt_secret }} and no fallback Qt SDK URL is configured" >&2
            exit 2
          fi

          docker_env=()
          if [[ "${{ matrix.arch }}" == arm64 || "${{ matrix.arch }}" == arm32 ]]; then
            docker_env+=(-e APPIMAGE_STAGE_ONLY=1)
          fi

          docker run --rm \
            --platform "${{ matrix.platform }}" \
            -v "${PWD}:/workspace" \
            -w /workspace \
            -e QT_ARCHIVE_URL="${QT_ARCHIVE_URL:-}" \
            -e QT_ARCHIVE_FALLBACK_URL="${QT_ARCHIVE_FALLBACK_URL:-}" \
            -e DOWNLOAD_PROXY="${DOWNLOAD_PROXY:-}" \
            -e PACKAGE_ARCH="${{ matrix.arch }}" \
            -e CLEAN_PACKAGES="${CLEAN_PACKAGES}" \
            "${docker_env[@]}" \
            ${{ matrix.image }} \
            bash -lc '
              set -euo pipefail
              export DEBIAN_FRONTEND=noninteractive
              apt-get update
              apt-get install -y --no-install-recommends \
                bash \
                build-essential \
                ca-certificates \
                cmake \
                curl \
                dpkg-dev \
                fakeroot \
                file \
                libfontconfig1-dev \
                libfreetype6-dev \
                libglib2.0-dev \
                libice-dev \
                libsm-dev \
                libx11-dev \
                libx11-xcb-dev \
                libxau-dev \
                libxi-dev \
                libxcb1-dev \
                libxcb-glx0-dev \
                libxcb-icccm4-dev \
                libxcb-image0-dev \
                libxcb-keysyms1-dev \
                libxcb-randr0-dev \
                libxcb-render0-dev \
                libxcb-render-util0-dev \
                libxcb-shape0-dev \
                libxcb-shm0-dev \
                libxcb-sync-dev \
                libxcb-util-dev \
                libxcb-xfixes0-dev \
                libxcb-xinerama0-dev \
                libxcb-xkb-dev \
                libxdmcp-dev \
                libxext-dev \
                libxkbcommon-dev \
                libxkbcommon-x11-dev \
                uuid-dev \
                patchelf \
                rpm \
                unzip \
                xz-utils \
                zlib1g

              qt_dir=/opt/qt-sdk
              archive=/tmp/qt-sdk.archive
              mkdir -p "${qt_dir}"
              qt_urls=()
              if [[ -n "${QT_ARCHIVE_URL:-}" ]]; then
                qt_urls+=("${QT_ARCHIVE_URL}")
              fi
              if [[ -n "${QT_ARCHIVE_FALLBACK_URL:-}" && "${QT_ARCHIVE_FALLBACK_URL:-}" != "${QT_ARCHIVE_URL:-}" ]]; then
                qt_urls+=("${QT_ARCHIVE_FALLBACK_URL}")
              fi
              downloaded=0
              for qt_url in "${qt_urls[@]}"; do
                curl_args=(-L --fail --connect-timeout 30 -o "${archive}")
                if [[ -n "${DOWNLOAD_PROXY:-}" ]]; then
                  curl_args+=(--proxy "${DOWNLOAD_PROXY}")
                fi
                if curl "${curl_args[@]}" "${qt_url}"; then
                  downloaded=1
                  break
                fi
                echo "warning: failed to download Qt SDK from ${qt_url}; trying next candidate" >&2
              done
              if ((downloaded == 0)); then
                echo "Unable to download Qt SDK archive" >&2
                exit 2
              fi

              if tar -tf "${archive}" >/dev/null 2>&1; then
                tar -xf "${archive}" -C "${qt_dir}"
              elif unzip -tq "${archive}" >/dev/null 2>&1; then
                unzip -q "${archive}" -d "${qt_dir}"
              else
                echo "Qt archive must be a tar/tar.gz/tar.xz/tgz or zip file" >&2
                exit 2
              fi

              moc_path="$(find "${qt_dir}" -type f -path "*/bin/moc" -print -quit)"
              if [[ -z "${moc_path}" ]]; then
                echo "Unable to locate bin/moc inside downloaded Qt archive" >&2
                exit 2
              fi
              chmod +x "${moc_path}" || true
              qt_root="$(cd -- "$(dirname -- "${moc_path}")/.." && pwd)"
              test -f "${qt_root}/lib/libQt5Core.so.5"
              echo "Using Qt root: ${qt_root}"

              build_dir="/workspace/build-ci-${PACKAGE_ARCH}"
              cmake -S /workspace -B "${build_dir}" \
                -DCMAKE_BUILD_TYPE=Release \
                -DNET_TUNNEL_QT_SDK_ROOT="${qt_root}" \
                -DNET_TUNNEL_BUILD_TESTS=ON
              cmake --build "${build_dir}" -j"$(nproc)"
              ctest --test-dir "${build_dir}" --output-on-failure

              package_args=(--all --skip-build)
              if [[ "${CLEAN_PACKAGES:-true}" == "true" ]]; then
                package_args+=(--clean)
              fi
              QT_ROOT="${qt_root}" \
              BUILD_DIR="${build_dir}" \
              DIST_DIR="/workspace/dist/${PACKAGE_ARCH}" \
              WORK_DIR="/workspace/.package-work/${PACKAGE_ARCH}" \
              scripts/package-linux.sh "${package_args[@]}"
            '
          sudo chown -R "$(id -u):$(id -g)" \
            "build-ci-${{ matrix.arch }}" \
            "dist/${{ matrix.arch }}" \
            ".package-work/${{ matrix.arch }}" || true

      - name: Build ARM AppImages on runner
        if: (env.BUILD_TARGET == 'all' || env.BUILD_TARGET == format('linux-{0}', matrix.arch)) && (matrix.arch == 'arm64' || matrix.arch == 'arm32')
        shell: bash
        run: |
          set -euo pipefail
          package_id="openai-reasoning-guard"
          version="$(sed -n 's/^project([^ ]* VERSION \([^ ]*\).*/\1/p' CMakeLists.txt)"
          version="${version:-0.1.0}"
          dist_dir="${PWD}/dist/${{ matrix.arch }}"
          work_dir="${PWD}/.package-work/${{ matrix.arch }}"
          tool="${RUNNER_TEMP}/appimagetool-x86_64.AppImage"
          runtime="${RUNNER_TEMP}/${{ matrix.appimage_runtime_asset }}"
          curl_args=(-L --fail --connect-timeout 30)
          if [[ -n "${DOWNLOAD_PROXY:-}" ]]; then
            curl_args+=(--proxy "${DOWNLOAD_PROXY}")
          fi
          curl "${curl_args[@]}" -o "${tool}" \
            "https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage"
          curl "${curl_args[@]}" -o "${runtime}" \
            "https://github.com/AppImage/AppImageKit/releases/download/continuous/${{ matrix.appimage_runtime_asset }}"
          chmod +x "${tool}" "${runtime}"

          build_appimage() {
            local variant="$1"
            local appdir="${work_dir}/AppDir-${variant}"
            local out="${dist_dir}/${package_id}-${variant}-${version}-${{ matrix.appimage_arch }}.AppImage"
            test -d "${appdir}"
            rm -f "${out}"
            ARCH="${{ matrix.appimage_arch }}" APPIMAGE_EXTRACT_AND_RUN=1 "${tool}" \
              --runtime-file "${runtime}" \
              "${appdir}" \
              "${out}"
            chmod +x "${out}"
            file "${out}"
          }

          build_appimage gui
          build_appimage cli

      - name: Upload Linux packages
        if: env.BUILD_TARGET == 'all' || env.BUILD_TARGET == format('linux-{0}', matrix.arch)
        uses: actions/upload-artifact@v4
        with:
          name: openai-reasoning-guard-linux-${{ matrix.arch }}
          path: |
            dist/${{ matrix.arch }}/*.deb
            dist/${{ matrix.arch }}/*.rpm
            dist/${{ matrix.arch }}/*.AppImage
          if-no-files-found: error

      - name: Publish Linux packages to GitHub Release
        if: (env.BUILD_TARGET == 'all' || env.BUILD_TARGET == format('linux-{0}', matrix.arch)) && (github.event_name == 'push' || inputs.publish_release == 'true')
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ github.event_name == 'push' && github.ref_name || inputs.release_tag }}
          RELEASE_PRERELEASE: ${{ github.event_name == 'workflow_dispatch' && 'true' || 'false' }}
        run: |
          set -euo pipefail
          shopt -s nullglob
          files=(dist/${{ matrix.arch }}/*.deb dist/${{ matrix.arch }}/*.rpm dist/${{ matrix.arch }}/*.AppImage)
          shopt -u nullglob
          if ((${#files[@]} == 0)); then
            echo "No Linux package files found for release upload" >&2
            exit 2
          fi
          if ! gh release view "${RELEASE_TAG}" -R "${GITHUB_REPOSITORY}" >/dev/null 2>&1; then
            create_args=(
              "${RELEASE_TAG}"
              --repo "${GITHUB_REPOSITORY}"
              --title "${RELEASE_TAG}"
              --notes "OpenAI Reasoning Guard package build ${GITHUB_SHA}."
            )
            if [[ "${RELEASE_PRERELEASE}" == "true" ]]; then
              create_args+=(--prerelease)
            fi
            gh release create "${create_args[@]}" || gh release view "${RELEASE_TAG}" -R "${GITHUB_REPOSITORY}" >/dev/null
          fi
          gh release upload "${RELEASE_TAG}" "${files[@]}" -R "${GITHUB_REPOSITORY}" --clobber

  windows:
    name: Windows ${{ matrix.arch }} MinGW exe
    needs: plan
    if: needs.plan.outputs.windows_enabled == 'true'
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.plan.outputs.windows_matrix) }}
    env:
      QT_ARCHIVE_URL: ${{ secrets[matrix.qt_secret] }}
      QT_ARCHIVE_FALLBACK_URL: https://github.com/${{ github.repository }}/releases/download/${{ matrix.sdk_release_tag }}/${{ matrix.sdk_asset }}
      DOWNLOAD_PROXY: ${{ secrets.DOWNLOAD_PROXY }}
      CLEAN_PACKAGES: ${{ github.event_name != 'workflow_dispatch' || inputs.clean != 'false' }}
      BUILD_TARGET: ${{ github.event_name == 'workflow_dispatch' && inputs.target || 'all' }}
    steps:
      - name: Checkout
        if: env.BUILD_TARGET == 'all' || env.BUILD_TARGET == format('windows-{0}', matrix.arch)
        uses: actions/checkout@v4

      - name: Install MinGW build dependencies
        if: env.BUILD_TARGET == 'all' || env.BUILD_TARGET == format('windows-{0}', matrix.arch)
        shell: bash
        run: |
          set -euo pipefail
          export DEBIAN_FRONTEND=noninteractive
          sudo apt-get update
          apt_packages=(
            build-essential
            ca-certificates
            cmake
            curl
            file
            nsis
            unzip
            xz-utils
            zip
          )
          if [[ -n "${{ matrix.apt_package }}" ]]; then
            apt_packages+=("${{ matrix.apt_package }}")
          fi
          sudo apt-get install -y --no-install-recommends "${apt_packages[@]}"

      - name: Install llvm-mingw for Windows ARM64
        if: (env.BUILD_TARGET == 'all' || env.BUILD_TARGET == format('windows-{0}', matrix.arch)) && matrix.arch == 'arm64'
        shell: bash
        run: |
          set -euo pipefail
          archive="${RUNNER_TEMP}/llvm-mingw.tar.xz"
          root="${RUNNER_TEMP}/llvm-mingw"
          mkdir -p "${root}"
          curl_args=(-L --fail --connect-timeout 30 -o "${archive}")
          if [[ -n "${DOWNLOAD_PROXY:-}" ]]; then
            curl_args+=(--proxy "${DOWNLOAD_PROXY}")
          fi
          curl "${curl_args[@]}" "${{ matrix.llvm_mingw_url }}"
          tar -xf "${archive}" -C "${root}" --strip-components=1
          test -x "${root}/bin/${{ matrix.mingw_triple }}-gcc"
          echo "MINGW_BIN_DIR=${root}/bin" >> "${GITHUB_ENV}"
          echo "MINGW_SYSROOT=${root}/${{ matrix.mingw_triple }}" >> "${GITHUB_ENV}"

      - name: Resolve Qt SDK
        if: env.BUILD_TARGET == 'all' || env.BUILD_TARGET == format('windows-{0}', matrix.arch)
        shell: bash
        run: |
          set -euo pipefail
          if [[ -z "${QT_ARCHIVE_URL:-}" && -z "${QT_ARCHIVE_FALLBACK_URL:-}" ]]; then
            echo "Missing repository secret ${{ matrix.qt_secret }} and no fallback Qt SDK URL is configured" >&2
            exit 2
          fi
          qt_dir="${RUNNER_TEMP}/qt-sdk"
          archive="${RUNNER_TEMP}/qt-sdk.archive"
          mkdir -p "${qt_dir}"
          qt_urls=()
          if [[ -n "${QT_ARCHIVE_URL:-}" ]]; then
            qt_urls+=("${QT_ARCHIVE_URL}")
          fi
          if [[ -n "${QT_ARCHIVE_FALLBACK_URL:-}" && "${QT_ARCHIVE_FALLBACK_URL:-}" != "${QT_ARCHIVE_URL:-}" ]]; then
            qt_urls+=("${QT_ARCHIVE_FALLBACK_URL}")
          fi
          downloaded=0
          for qt_url in "${qt_urls[@]}"; do
            curl_args=(-L --fail --connect-timeout 30 -o "${archive}")
            if [[ -n "${DOWNLOAD_PROXY:-}" ]]; then
              curl_args+=(--proxy "${DOWNLOAD_PROXY}")
            fi
            if curl "${curl_args[@]}" "${qt_url}"; then
              downloaded=1
              break
            fi
            echo "warning: failed to download Qt SDK from ${qt_url}; trying next candidate" >&2
          done
          if ((downloaded == 0)); then
            echo "Unable to download Qt SDK archive" >&2
            exit 2
          fi
          if tar -tf "${archive}" >/dev/null 2>&1; then
            tar -xf "${archive}" -C "${qt_dir}"
          elif unzip -tq "${archive}" >/dev/null 2>&1; then
            unzip -q "${archive}" -d "${qt_dir}"
          else
            echo "Qt archive must be a tar/tar.gz/tar.xz/tgz or zip file" >&2
            exit 2
          fi
          moc_path="$(find "${qt_dir}" -type f -path "*/bin/moc" -print -quit)"
          if [[ -z "${moc_path}" ]]; then
            echo "Unable to locate Linux host bin/moc inside downloaded Windows MinGW Qt archive" >&2
            exit 2
          fi
          chmod +x "${moc_path}" || true
          qt_root="$(cd -- "$(dirname -- "${moc_path}")/.." && pwd)"
          test -f "${qt_root}/bin/Qt5Core.dll"
          test -f "${qt_root}/lib/cmake/Qt5/Qt5Config.cmake"
          echo "QT_ROOT=${qt_root}" >> "${GITHUB_ENV}"
          echo "Using Qt root: ${qt_root}"

      - name: Build Windows package
        if: env.BUILD_TARGET == 'all' || env.BUILD_TARGET == format('windows-{0}', matrix.arch)
        shell: bash
        run: |
          set -euo pipefail
          clean_arg=()
          if [[ "${CLEAN_PACKAGES}" == "true" ]]; then
            clean_arg+=(--clean)
          fi
          QT_ROOT="${QT_ROOT}" \
          MINGW_TRIPLE="${{ matrix.mingw_triple }}" \
          PACKAGE_ARCH="${{ matrix.arch }}" \
          BUILD_DIR="${PWD}/build-ci-windows-${{ matrix.arch }}" \
          DIST_DIR="${PWD}/dist/windows-${{ matrix.arch }}" \
          scripts/package-windows-mingw.sh "${clean_arg[@]}"

      - name: Upload Windows package
        if: env.BUILD_TARGET == 'all' || env.BUILD_TARGET == format('windows-{0}', matrix.arch)
        uses: actions/upload-artifact@v4
        with:
          name: openai-reasoning-guard-windows-${{ matrix.arch }}
          path: |
            dist/windows-${{ matrix.arch }}/*windows-${{ matrix.arch }}*.zip
            dist/windows-${{ matrix.arch }}/*windows-${{ matrix.arch }}*.exe
          if-no-files-found: error

      - name: Publish Windows package to GitHub Release
        if: (env.BUILD_TARGET == 'all' || env.BUILD_TARGET == format('windows-{0}', matrix.arch)) && (github.event_name == 'push' || inputs.publish_release == 'true')
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ github.event_name == 'push' && github.ref_name || inputs.release_tag }}
          RELEASE_PRERELEASE: ${{ github.event_name == 'workflow_dispatch' && 'true' || 'false' }}
        run: |
          set -euo pipefail
          shopt -s nullglob
          files=(dist/windows-${{ matrix.arch }}/*windows-${{ matrix.arch }}*.zip dist/windows-${{ matrix.arch }}/*windows-${{ matrix.arch }}*.exe)
          shopt -u nullglob
          if ((${#files[@]} == 0)); then
            echo "No Windows package files found for release upload" >&2
            exit 2
          fi
          if ! gh release view "${RELEASE_TAG}" -R "${GITHUB_REPOSITORY}" >/dev/null 2>&1; then
            create_args=(
              "${RELEASE_TAG}"
              --repo "${GITHUB_REPOSITORY}"
              --title "${RELEASE_TAG}"
              --notes "OpenAI Reasoning Guard package build ${GITHUB_SHA}."
            )
            if [[ "${RELEASE_PRERELEASE}" == "true" ]]; then
              create_args+=(--prerelease)
            fi
            gh release create "${create_args[@]}" || gh release view "${RELEASE_TAG}" -R "${GITHUB_REPOSITORY}" >/dev/null
          fi
          gh release upload "${RELEASE_TAG}" "${files[@]}" -R "${GITHUB_REPOSITORY}" --clobber

  macos:
    name: macOS ${{ matrix.arch }} dmg
    needs: plan
    if: needs.plan.outputs.macos_enabled == 'true'
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.plan.outputs.macos_matrix) }}
    env:
      QT_ARCHIVE_URL: ${{ secrets[matrix.qt_secret] }}
      QT_ARCHIVE_FALLBACK_URL: https://github.com/${{ github.repository }}/releases/download/${{ matrix.sdk_release_tag }}/${{ matrix.sdk_asset }}
      DOWNLOAD_PROXY: ${{ secrets.DOWNLOAD_PROXY }}
      CLEAN_PACKAGES: ${{ github.event_name != 'workflow_dispatch' || inputs.clean != 'false' }}
      BUILD_TARGET: ${{ github.event_name == 'workflow_dispatch' && inputs.target || 'all' }}
    steps:
      - name: Checkout
        if: env.BUILD_TARGET == 'all' || env.BUILD_TARGET == format('macos-{0}', matrix.arch)
        uses: actions/checkout@v4

      - name: Resolve Qt SDK
        if: env.BUILD_TARGET == 'all' || env.BUILD_TARGET == format('macos-{0}', matrix.arch)
        shell: bash
        run: |
          set -euo pipefail
          if [[ -z "${QT_ARCHIVE_URL:-}" && -z "${QT_ARCHIVE_FALLBACK_URL:-}" ]]; then
            echo "Missing repository secret ${{ matrix.qt_secret }} and no fallback Qt SDK URL is configured" >&2
            exit 2
          fi
          qt_dir="${RUNNER_TEMP}/qt-sdk"
          archive="${RUNNER_TEMP}/qt-sdk.archive"
          mkdir -p "${qt_dir}"
          qt_urls=()
          if [[ -n "${QT_ARCHIVE_URL:-}" ]]; then
            qt_urls+=("${QT_ARCHIVE_URL}")
          fi
          if [[ -n "${QT_ARCHIVE_FALLBACK_URL:-}" && "${QT_ARCHIVE_FALLBACK_URL:-}" != "${QT_ARCHIVE_URL:-}" ]]; then
            qt_urls+=("${QT_ARCHIVE_FALLBACK_URL}")
          fi
          downloaded=0
          for qt_url in "${qt_urls[@]}"; do
            curl_args=(-L --fail --connect-timeout 30 -o "${archive}")
            if [[ -n "${DOWNLOAD_PROXY:-}" ]]; then
              curl_args+=(--proxy "${DOWNLOAD_PROXY}")
            fi
            if curl "${curl_args[@]}" "${qt_url}"; then
              downloaded=1
              break
            fi
            echo "warning: failed to download Qt SDK from ${qt_url}; trying next candidate" >&2
          done
          if ((downloaded == 0)); then
            echo "Unable to download Qt SDK archive" >&2
            exit 2
          fi
          if tar -tf "${archive}" >/dev/null 2>&1; then
            tar -xf "${archive}" -C "${qt_dir}"
          elif unzip -tq "${archive}" >/dev/null 2>&1; then
            unzip -q "${archive}" -d "${qt_dir}"
          else
            echo "Qt archive must be a tar/tar.gz/tar.xz/tgz or zip file" >&2
            exit 2
          fi
          moc_path="$(find "${qt_dir}" -type f -path '*/bin/moc' -print -quit)"
          if [[ -z "${moc_path}" ]]; then
            echo "Unable to locate bin/moc inside downloaded Qt archive" >&2
            exit 2
          fi
          qt_root="$(cd -- "$(dirname -- "${moc_path}")/.." && pwd)"
          test -x "${qt_root}/bin/macdeployqt"
          echo "QT_ROOT=${qt_root}" >> "${GITHUB_ENV}"
          echo "Using Qt root: ${qt_root}"

      - name: Build and test
        if: env.BUILD_TARGET == 'all' || env.BUILD_TARGET == format('macos-{0}', matrix.arch)
        shell: bash
        run: |
          set -euo pipefail
          build_dir="build-ci-${{ matrix.arch }}"
          cmake -S . -B "${build_dir}" \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_OSX_ARCHITECTURES="${{ matrix.cmake_arch }}" \
            -DCMAKE_OSX_DEPLOYMENT_TARGET="${{ matrix.deployment_target }}" \
            -DNET_TUNNEL_QT_SDK_ROOT="${QT_ROOT}" \
            -DNET_TUNNEL_BUILD_TESTS=ON
          cmake --build "${build_dir}" -j"$(sysctl -n hw.ncpu)"
          ctest --test-dir "${build_dir}" --output-on-failure

      - name: Build macOS dmg
        if: env.BUILD_TARGET == 'all' || env.BUILD_TARGET == format('macos-{0}', matrix.arch)
        shell: bash
        run: |
          set -euo pipefail
          clean_arg=()
          if [[ "${CLEAN_PACKAGES}" == "true" ]]; then
            clean_arg+=(--clean)
          fi
          QT_ROOT="${QT_ROOT}" \
          BUILD_DIR="${PWD}/build-ci-${{ matrix.arch }}" \
          scripts/package-macos.sh \
            --arch "${{ matrix.arch }}" \
            --skip-build \
            "${clean_arg[@]}"

      - name: Upload macOS dmg
        if: env.BUILD_TARGET == 'all' || env.BUILD_TARGET == format('macos-{0}', matrix.arch)
        uses: actions/upload-artifact@v4
        with:
          name: openai-reasoning-guard-macos-${{ matrix.arch }}
          path: dist/*macos-${{ matrix.arch }}*.dmg
          if-no-files-found: error

      - name: Publish macOS dmg to GitHub Release
        if: (env.BUILD_TARGET == 'all' || env.BUILD_TARGET == format('macos-{0}', matrix.arch)) && (github.event_name == 'push' || inputs.publish_release == 'true')
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ github.event_name == 'push' && github.ref_name || inputs.release_tag }}
          RELEASE_PRERELEASE: ${{ github.event_name == 'workflow_dispatch' && 'true' || 'false' }}
        run: |
          set -euo pipefail
          shopt -s nullglob
          files=(dist/*macos-${{ matrix.arch }}*.dmg)
          shopt -u nullglob
          if ((${#files[@]} == 0)); then
            echo "No macOS dmg files found for release upload" >&2
            exit 2
          fi
          if ! gh release view "${RELEASE_TAG}" -R "${GITHUB_REPOSITORY}" >/dev/null 2>&1; then
            create_args=(
              "${RELEASE_TAG}"
              --repo "${GITHUB_REPOSITORY}"
              --title "${RELEASE_TAG}"
              --notes "OpenAI Reasoning Guard package build ${GITHUB_SHA}."
            )
            if [[ "${RELEASE_PRERELEASE}" == "true" ]]; then
              create_args+=(--prerelease)
            fi
            gh release create "${create_args[@]}" || gh release view "${RELEASE_TAG}" -R "${GITHUB_REPOSITORY}" >/dev/null
          fi
          gh release upload "${RELEASE_TAG}" "${files[@]}" -R "${GITHUB_REPOSITORY}" --clobber
