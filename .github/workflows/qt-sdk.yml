name: Qt SDK Archives

on:
  workflow_dispatch:
    inputs:
      target:
        description: "Qt SDK target to build"
        required: true
        default: "linux-x86_64"
        type: choice
        options:
          - "linux-x86_64"
          - "linux-x86_32"
          - "linux-arm64"
          - "linux-arm32"
          - "windows-x86_64"
          - "windows-x86_32"
          - "macos-x86_64"
          - "macos-aarch64"
          - "all"
      qtbase_url:
        description: "Download URL for Qt 5.15.x qtbase source archive"
        required: true
        default: "https://download.qt.io/archive/qt/5.15/5.15.2/submodules/qtbase-everywhere-src-5.15.2.tar.xz"
        type: string
      qttools_url:
        description: "Download URL for Qt 5.15.x qttools source archive; required for macOS SDKs"
        required: false
        default: "https://download.qt.io/archive/qt/5.15/5.15.2/submodules/qttools-everywhere-src-5.15.2.tar.xz"
        type: string
      openssl_url:
        description: "Download URL for OpenSSL source archive; required for Linux and Windows MinGW SDKs"
        required: false
        default: "https://github.com/openssl/openssl/releases/download/OpenSSL_1_1_1w/openssl-1.1.1w.tar.gz"
        type: string
      release_tag:
        description: "Optional override; default is qt-sdk-<target>. Avoid overriding when target=all"
        required: false
        type: string
      clean:
        description: "Clean SDK build directories before building"
        required: false
        default: "true"
        type: choice
        options:
          - "true"
          - "false"

permissions:
  contents: write

jobs:
  plan:
    name: Select Qt SDK targets
    runs-on: ubuntu-22.04
    outputs:
      linux_enabled: ${{ steps.matrix.outputs.linux_enabled }}
      linux_matrix: ${{ steps.matrix.outputs.linux_matrix }}
      windows_enabled: ${{ steps.matrix.outputs.windows_enabled }}
      windows_matrix: ${{ steps.matrix.outputs.windows_matrix }}
      macos_enabled: ${{ steps.matrix.outputs.macos_enabled }}
      macos_matrix: ${{ steps.matrix.outputs.macos_matrix }}
    steps:
      - id: matrix
        shell: bash
        env:
          REQUESTED_TARGET: ${{ inputs.target }}
        run: |
          set -euo pipefail
          linux='[]'
          windows='[]'
          macos='[]'

          case "${REQUESTED_TARGET}" in
            all)
              linux='[{"target":"linux-x86_64","image":"debian:bookworm"},{"target":"linux-x86_32","image":"i386/debian:bookworm"},{"target":"linux-arm64","image":"arm64v8/debian:bookworm"},{"target":"linux-arm32","image":"arm32v7/debian:bookworm"}]'
              windows='[{"target":"windows-x86_64"},{"target":"windows-x86_32"}]'
              macos='[{"target":"macos-x86_64","runner":"macos-13"},{"target":"macos-aarch64","runner":"macos-14"}]'
              ;;
            linux-x86_64)
              linux='[{"target":"linux-x86_64","image":"debian:bookworm"}]'
              ;;
            linux-x86_32)
              linux='[{"target":"linux-x86_32","image":"i386/debian:bookworm"}]'
              ;;
            linux-arm64)
              linux='[{"target":"linux-arm64","image":"arm64v8/debian:bookworm"}]'
              ;;
            linux-arm32)
              linux='[{"target":"linux-arm32","image":"arm32v7/debian:bookworm"}]'
              ;;
            windows-x86_64)
              windows='[{"target":"windows-x86_64"}]'
              ;;
            windows-x86_32)
              windows='[{"target":"windows-x86_32"}]'
              ;;
            macos-x86_64)
              macos='[{"target":"macos-x86_64","runner":"macos-13"}]'
              ;;
            macos-aarch64)
              macos='[{"target":"macos-aarch64","runner":"macos-14"}]'
              ;;
            *)
              echo "unsupported target: ${REQUESTED_TARGET}" >&2
              exit 2
              ;;
          esac

          enabled() {
            [[ "$1" != "[]" ]] && printf true || printf false
          }

          {
            echo "linux_enabled=$(enabled "${linux}")"
            echo "linux_matrix={\"include\":${linux}}"
            echo "windows_enabled=$(enabled "${windows}")"
            echo "windows_matrix={\"include\":${windows}}"
            echo "macos_enabled=$(enabled "${macos}")"
            echo "macos_matrix={\"include\":${macos}}"
          } >> "${GITHUB_OUTPUT}"

  linux:
    name: Qt SDK ${{ matrix.target }}
    needs: plan
    if: needs.plan.outputs.linux_enabled == 'true'
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.plan.outputs.linux_matrix) }}
    env:
      BUILD_TARGET: ${{ inputs.target }}
      DOWNLOAD_PROXY: ${{ secrets.DOWNLOAD_PROXY }}
      GH_TOKEN: ${{ github.token }}
    steps:
      - name: Checkout
        if: env.BUILD_TARGET == 'all' || env.BUILD_TARGET == matrix.target
        uses: actions/checkout@v4

      - name: Enable QEMU
        if: env.BUILD_TARGET == 'all' || env.BUILD_TARGET == matrix.target
        uses: docker/setup-qemu-action@v3

      - name: Download sources
        if: env.BUILD_TARGET == 'all' || env.BUILD_TARGET == matrix.target
        shell: bash
        run: |
          set -euo pipefail
          if [[ -z "${{ inputs.openssl_url }}" ]]; then
            echo "openssl_url is required for Linux Qt SDK builds" >&2
            exit 2
          fi
          curl_args=(-L --fail --connect-timeout 30)
          if [[ -n "${DOWNLOAD_PROXY:-}" ]]; then
            curl_args+=(--proxy "${DOWNLOAD_PROXY}")
          fi
          curl "${curl_args[@]}" -o "${RUNNER_TEMP}/qtbase.tar.xz" "${{ inputs.qtbase_url }}"
          curl "${curl_args[@]}" -o "${RUNNER_TEMP}/openssl.tar.gz" "${{ inputs.openssl_url }}"

      - name: Build and publish Linux Qt SDK
        if: env.BUILD_TARGET == 'all' || env.BUILD_TARGET == matrix.target
        shell: bash
        run: |
          set -euo pipefail
          args=(
            --target "${{ matrix.target }}"
            --docker
            --docker-image "${{ matrix.image }}"
            --qtbase-source-archive "${RUNNER_TEMP}/qtbase.tar.xz"
            --openssl-source-archive "${RUNNER_TEMP}/openssl.tar.gz"
            --archive
            --upload
            --repo "${GITHUB_REPOSITORY}"
          )
          if [[ "${{ inputs.clean }}" == "true" ]]; then
            args+=(--clean)
          fi
          if [[ -n "${{ inputs.release_tag }}" && "${{ inputs.target }}" != "all" ]]; then
            args+=(--release-tag "${{ inputs.release_tag }}")
          fi
          scripts/build-qt5-linux-sdk.sh "${args[@]}"

  windows-mingw:
    name: Qt SDK ${{ matrix.target }}
    needs: plan
    if: needs.plan.outputs.windows_enabled == 'true'
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.plan.outputs.windows_matrix) }}
    env:
      BUILD_TARGET: ${{ inputs.target }}
      DOWNLOAD_PROXY: ${{ secrets.DOWNLOAD_PROXY }}
      GH_TOKEN: ${{ github.token }}
    steps:
      - name: Checkout
        if: env.BUILD_TARGET == 'all' || env.BUILD_TARGET == matrix.target
        uses: actions/checkout@v4

      - name: Download sources
        if: env.BUILD_TARGET == 'all' || env.BUILD_TARGET == matrix.target
        shell: bash
        run: |
          set -euo pipefail
          if [[ -z "${{ inputs.openssl_url }}" ]]; then
            echo "openssl_url is required for Windows MinGW Qt SDK builds" >&2
            exit 2
          fi
          curl_args=(-L --fail --connect-timeout 30)
          if [[ -n "${DOWNLOAD_PROXY:-}" ]]; then
            curl_args+=(--proxy "${DOWNLOAD_PROXY}")
          fi
          curl "${curl_args[@]}" -o "${RUNNER_TEMP}/qtbase.tar.xz" "${{ inputs.qtbase_url }}"
          curl "${curl_args[@]}" -o "${RUNNER_TEMP}/openssl.tar.gz" "${{ inputs.openssl_url }}"

      - name: Build and publish Windows MinGW Qt SDK
        if: env.BUILD_TARGET == 'all' || env.BUILD_TARGET == matrix.target
        shell: bash
        run: |
          set -euo pipefail
          args=(
            --target "${{ matrix.target }}"
            --qtbase-source-archive "${RUNNER_TEMP}/qtbase.tar.xz"
            --openssl-source-archive "${RUNNER_TEMP}/openssl.tar.gz"
            --archive
            --upload
            --repo "${GITHUB_REPOSITORY}"
          )
          if [[ "${{ inputs.clean }}" == "true" ]]; then
            args+=(--clean)
          fi
          if [[ -n "${{ inputs.release_tag }}" && "${{ inputs.target }}" != "all" ]]; then
            args+=(--release-tag "${{ inputs.release_tag }}")
          fi
          scripts/build-qt5-windows-mingw-sdk.sh "${args[@]}"

  macos:
    name: Qt SDK ${{ matrix.target }}
    needs: plan
    if: needs.plan.outputs.macos_enabled == 'true'
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.plan.outputs.macos_matrix) }}
    env:
      BUILD_TARGET: ${{ inputs.target }}
      DOWNLOAD_PROXY: ${{ secrets.DOWNLOAD_PROXY }}
      GH_TOKEN: ${{ github.token }}
    steps:
      - name: Checkout
        if: env.BUILD_TARGET == 'all' || env.BUILD_TARGET == matrix.target
        uses: actions/checkout@v4

      - name: Download qtbase source
        if: env.BUILD_TARGET == 'all' || env.BUILD_TARGET == matrix.target
        shell: bash
        run: |
          set -euo pipefail
          if [[ -z "${{ inputs.qttools_url }}" ]]; then
            echo "qttools_url is required for macOS Qt SDK builds because macdeployqt is needed" >&2
            exit 2
          fi
          curl_args=(-L --fail --connect-timeout 30)
          if [[ -n "${DOWNLOAD_PROXY:-}" ]]; then
            curl_args+=(--proxy "${DOWNLOAD_PROXY}")
          fi
          curl "${curl_args[@]}" -o "${RUNNER_TEMP}/qtbase.tar.xz" "${{ inputs.qtbase_url }}"
          curl "${curl_args[@]}" -o "${RUNNER_TEMP}/qttools.tar.xz" "${{ inputs.qttools_url }}"

      - name: Build and publish macOS Qt SDK
        if: env.BUILD_TARGET == 'all' || env.BUILD_TARGET == matrix.target
        shell: bash
        run: |
          set -euo pipefail
          args=(
            --target "${{ matrix.target }}"
            --qtbase-source-archive "${RUNNER_TEMP}/qtbase.tar.xz"
            --qttools-source-archive "${RUNNER_TEMP}/qttools.tar.xz"
            --archive
            --upload
          )
          if [[ "${{ inputs.clean }}" == "true" ]]; then
            args+=(--clean)
          fi
          if [[ -n "${{ inputs.release_tag }}" && "${{ inputs.target }}" != "all" ]]; then
            args+=(--release-tag "${{ inputs.release_tag }}")
          fi
          REPO="${GITHUB_REPOSITORY}" scripts/build-qt5-macos-sdk.sh "${args[@]}"
